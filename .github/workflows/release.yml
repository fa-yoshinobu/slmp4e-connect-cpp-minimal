name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone shared verification vectors
        run: |
          target="$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"
          rm -rf "$target"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/fa-yoshinobu/plc-comm-slmp-cross-verify.git "$target"
          git -C "$target" sparse-checkout set specs/shared

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install host tools
        run: |
          python -m pip install --upgrade pip
          pip install platformio
          sudo apt-get update
          sudo apt-get install -y doxygen zip

      - name: Generate shared spec header
        run: python scripts/generate_shared_spec.py

      - name: Build host tests
        run: g++ -std=c++17 -Wall -Wextra -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests

      - name: Run host tests
        run: /tmp/slmp_minimal_tests

      - name: Run socket integration test
        run: python scripts/run_socket_integration.py --compiler g++

      - name: Build PlatformIO samples
        run: |
          pio run -e esp32-devkitc-low-level
          pio run -e esp32-devkitc-high-level

      - name: Generate docs
        run: |
          doxygen Doxyfile
          cp docsrc/index.html docs/index.html

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
            tag="v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build release archive
        shell: bash
        run: |
          mkdir -p release-artifacts
          archive="release-artifacts/slmp-connect-cpp-minimal-v${{ steps.version.outputs.version }}.zip"
          git archive --format=zip --output "${archive}" HEAD
          unzip -l "${archive}" README.md library.properties library.json LICENSE src/* examples/* > /dev/null

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          asset="release-artifacts/slmp-connect-cpp-minimal-v${{ steps.version.outputs.version }}.zip"
          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${tag}" "${asset}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${tag}" "${asset}" --repo "${GITHUB_REPOSITORY}" --title "Release ${tag}" --generate-notes --target main
          fi
