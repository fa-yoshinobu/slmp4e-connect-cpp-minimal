name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Create Archive
        run: |
          mkdir -p release-artifacts
          zip -r release-artifacts/slmp-cpp-minimal-${{ github.ref_name }}.zip . -x "*.git*" "node_modules/*" "local_folder/*"
          
      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if [[ -z "$tag" || "$tag" == "main" ]]; then tag="v0.1.0"; fi
          
          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" release-artifacts/* --clobber
          else
            gh release create "$tag" release-artifacts/* --title "Release $tag" --generate-notes
          fi
