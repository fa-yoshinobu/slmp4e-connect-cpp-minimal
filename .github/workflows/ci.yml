name: ci

on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clone shared verification vectors
        run: |
          target="$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"
          rm -rf "$target"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/fa-yoshinobu/plc-comm-slmp-cross-verify.git "$target"
          git -C "$target" sparse-checkout set specs/shared
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate shared spec header
        run: python scripts/generate_shared_spec.py
      - name: Build host tests
        run: g++ -std=c++17 -Wall -Wextra -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests
      - name: Run host tests
        run: /tmp/slmp_minimal_tests
      - name: Run socket integration test
        run: python scripts/run_socket_integration.py --compiler g++

  host-sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clone shared verification vectors
        run: |
          target="$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"
          rm -rf "$target"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/fa-yoshinobu/plc-comm-slmp-cross-verify.git "$target"
          git -C "$target" sparse-checkout set specs/shared
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate shared spec header
        run: python scripts/generate_shared_spec.py
      - name: Build host tests with sanitizers
        run: g++ -std=c++17 -Wall -Wextra -O1 -g -fsanitize=address,undefined -fno-omit-frame-pointer -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests_san
      - name: Run sanitizer tests
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: /tmp/slmp_minimal_tests_san

  host-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clone shared verification vectors
        run: |
          target="$GITHUB_WORKSPACE/../plc-comm-slmp-cross-verify"
          rm -rf "$target"
          git clone --depth 1 --filter=blob:none --sparse https://github.com/fa-yoshinobu/plc-comm-slmp-cross-verify.git "$target"
          git -C "$target" sparse-checkout set specs/shared
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Generate shared spec header
        run: python scripts/generate_shared_spec.py
      - name: Install gcovr
        run: pip install gcovr
      - name: Build host tests with coverage
        run: g++ -std=c++17 -Wall -Wextra --coverage -Isrc tests/slmp_minimal_tests.cpp src/slmp_minimal.cpp src/slmp_high_level.cpp -o /tmp/slmp_minimal_tests_cov
      - name: Run coverage tests
        run: /tmp/slmp_minimal_tests_cov
      - name: Generate coverage reports
        run: |
          gcovr --root . --filter src --txt-summary > coverage-summary.txt
          gcovr --root . --filter src --xml-pretty -o coverage.xml
          gcovr --root . --filter src --html-details coverage.html
      - name: Publish coverage summary
        run: cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: host-coverage
          path: |
            coverage-summary.txt
            coverage.xml
            coverage.html

  platformio:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - esp32-devkitc-low-level
          - esp32-devkitc-high-level
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install PlatformIO
        run: pip install platformio
      - name: Build ${{ matrix.env }}
        run: pio run -e ${{ matrix.env }}
